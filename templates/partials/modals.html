<style>
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 7, 11, 0.85); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
    .modal-box { background: var(--card); padding: 24px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .btn-close { background: #1e293b; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn-save { background: var(--accent); color: var(--bg); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; }
</style>
<div id="qrModal" class="modal-overlay" onclick="this.style.display='none'">
    <div class="modal-box" onclick="event.stopPropagation()" style="text-align: center;">
        <img id="qrImg" src="" alt="QR" style="width: 220px; height: 220px; border-radius: 8px; margin-bottom: 15px; display: block;">
        <div style="font-size: 13px; color: var(--muted); margin-bottom: 20px;">Отсканируйте в приложении AmneziaWG</div>
        <button class="btn-close" onclick="document.getElementById('qrModal').style.display='none'">Закрыть</button>
    </div>
</div>
<div id="renameModal" class="modal-overlay" onclick="closeRenameModal()">
    <div class="modal-box" onclick="event.stopPropagation()" style="width: 320px;">
        <h3 style="margin-top: 0; color: var(--text); font-size: 18px;">Изменить имя</h3>
        <form action="/cabinet/rename" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="hidden" name="ip" id="renameIp">
            <input type="text" name="name" id="renameName" required style="width: 100%; box-sizing: border-box; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: var(--text); outline: none; font-size: 14px;">
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 5px;">
                <button type="button" class="btn-close" onclick="closeRenameModal()">Отмена</button>
                <button type="submit" class="btn-save">Сохранить</button>
            </div>
        </form>
    </div>
</div>
<script>
    function showQR(b64) { document.getElementById('qrImg').src = 'data:image/png;base64,' + b64; document.getElementById('qrModal').style.display = 'flex'; }
    function openRenameModal(ip, currentName) { document.getElementById('renameIp').value = ip; document.getElementById('renameName').value = currentName; document.getElementById('renameModal').style.display = 'flex'; document.getElementById('renameName').focus(); }
    function closeRenameModal() { document.getElementById('renameModal').style.display = 'none'; }
</script>
