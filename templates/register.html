<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Azrail-Laba</title>
    <style>
        :root { --bg: #060a12; --card: #0d1527; --border: #1b2640; --text: #f1f5f9; --muted: #64748b; --accent: #38bdf8; --danger: #ef4444; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .auth-card { background: var(--card); border: 1px solid var(--border); padding: 40px 30px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; }
        .logo-text { font-size: 28px; font-weight: 800; margin-bottom: 30px; letter-spacing: -0.5px; }
        .logo-text span { color: var(--accent); }
        .form-group { text-align: left; margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; }
        input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 14px; transition: border 0.2s; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; background: var(--accent); color: var(--bg); border: none; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 15px; cursor: pointer; transition: opacity 0.2s; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        .flash { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
        .links { margin-top: 25px; font-size: 14px; color: var(--muted); }
        .links a { color: var(--accent); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-text">Azrail<span>Laba</span></div>
        {% with messages = get_flashed_messages() %}{% if messages %}{% for message in messages %}<div class="flash">{{ message }}</div>{% endfor %}{% endif %}{% endwith %}
        <form method="POST">
            <div class="form-group"><label>Логин (латиница)</label><input type="text" name="username" pattern="^[a-zA-Z0-9]{3,20}$" required></div>
            <div class="form-group"><label>Телефон</label><input type="text" name="phone" required></div>
            <div class="form-group"><label>Пароль</label><input type="password" name="password" minlength="6" required></div>
            <div class="form-group"><label>Повторите пароль</label><input type="password" name="confirm_password" minlength="6" required></div>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <div class="links">Уже есть аккаунт? <a href="/">Войти</a></div>
    </div>
</body>
</html>
